app.id=energy-ai-api
apollo.bootstrap.enabled=false
apollo.bootstrap.eagerLoad.enabled=false
apollo.bootstrap.namespaces=application,common
#################################### application start ####################################
##charset but not work
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force-response=true
server.tomcat.uri-encoding=UTF-8
spring.main.allow-bean-definition-overriding=true
##spring ai
spring.ai.dashscope.api-key=[阿里百炼dashscope api key]
spring.ai.dashscope.chat.options.model=qwen3.5-plus
##本地ollama运行的大模型 按需更改工程中LLM调用的选择
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen3.5:9b
spring.ai.dashscope.embedding.options.dimensions=1024
##本应用mcp服务
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=energy-ai-mcp-server
spring.ai.mcp.server.protocol=streamable
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.streamable-http.keep-alive-interval=30s
#spring.ai.mcp.server.sse-message-endpoint=/mcp/message
##远程mcp服务 如无远程mcp服务，注释下列client内容
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.initialized=true
spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.streamable-http.fix.connections.fcwenergy-mcp-server.url=http://localhost:8004
spring.ai.mcp.client.streamable-http.fix.connections.fcwenergy-mcp-server.endpoint=/mcp/sse
spring.ai.mcp.client.request-timeout=20s
#不适用sse，断连不重连，使用最新支持的streamable
#spring.ai.mcp.client.sse.fix.connections.fcwenergy-mcp-server.url=http://localhost:8004
#spring.ai.mcp.client.sse.fix.connections.fcwenergy-mcp-server.sse-endpoint=/mcp/sse
#本地工具mcp 暂用不上
#spring.ai.mcp.client.stdio.servers-configuration=mcp-servers.json
##向量存储参数
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.max-document-batch-size=10000
##自定义搜索服务apikey tencent-deepSeek/web search api
ai.search-api.simple-key=[Pexels API key]
ai.search-api.tencent-api-secret-sk=[腾讯原子能力授权sk]
ai.search-api.tencent-api-secret-id=[腾讯原子能力应用id]
ai.search-api.tencent-api-secret-key=[腾讯原子能力api sk]
## rag config
ai.rag.similarity-threshold=0.7
ai.rag.similarity-top-k=3
ai.rag.rerank-min-score=0.1
ai.rag.bm25-similarity-threshold=0.4
ai.rag.bm25-top-k=5
ai.rag.rerank-model-name=ai-rerank
ai.rag.rerank-api-key=[阿里百炼 dashscope rerank api key]
ai.rag.enable-local-document=false
ai.rag.ali-dash-scope-app-id=[阿里百炼dashscope app id]
ai.rag.ali-dash-scope-knowledge-index=[阿里百炼知识库名称]
#本地文档区分绝对路径资源和打包的resources资源
ai.rag.local-document-paths=E:\\code\\base-ai-assistant\\energy-ai-api\\src\\main\\resources\\document-exp
ai.rag.resource-document-path=document-exp
ai.rag.enable-intent-analysis=true
### server
server.port=9051
server.shutdown=graceful
spring.freemarker.check-template-location=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.lifecycle.timeout-per-shutdown-phase=5s
spring.mvc.format.date=yyyy-MM-dd HH:mm:ss
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
#xxl-job配置
xxl.job.executor.appname=job-executor-energy-ai
xxl.job.executor.port=18020
#开发环境跨域配置
api.cors.allowOrigin=true
#Dubbo 服务名称
dubbo.application.name=dubbo-energy-ai-api
#通信端口 每个服务对应一个内网端口
dubbo.protocol.port=20991
#qosPort在一台机器中仅允许一个服务占用
dubbo.application.qosPort=33391
#spring-cloud 服务名称
spring.application.name=energy-ai-api
#dubbo/feign test，微服务环境下仅本地调用验证
dubbo-energy-admin-api.url=dubbo://localhost:20990
feign-energy-admin-api.url=http://localhost:9050
#################################### application end ####################################
#################################### common start ####################################
logging.level.com.assistant.ai.repository.trans.mapper=debug
logging.level.com.assistant.ai.repository.pgsql.mapper=debug
logging.level.io.micrometer.core.instrument.MeterRegistry=error
#mybatis plus 主库和通用配置
mybatis-plus.check-config-location=true
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumOrdinalTypeHandler
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.mapper-locations=classpath*:trans/mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
## jdbc
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.druid.username=[mysql db username]
spring.datasource.druid.password=[mysql db psw]
spring.datasource.mysql.host=[mysql db ip]
spring.datasource.mysql.port=3306
spring.datasource.druid.url=jdbc:mysql://${spring.datasource.mysql.host}:${spring.datasource.mysql.port}/energy_ai?serverTimezone=GMT%2B8&characterEncoding=utf8&useSSL=true&autoReconnect=true&rewriteBatchedStatements=true&socketTimeout=600000
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=10
spring.datasource.druid.max-active=500
spring.datasource.druid.max-wait=30000
spring.datasource.druid.connect-timeout=30000
spring.datasource.druid.query-timeout=30000
spring.datasource.druid.transaction-query-timeout=30000
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.max-evictable-idle-time-millis=900000
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=true
spring.datasource.druid.test-on-return=false
spring.datasource.druid.remove-abandoned=true
spring.datasource.druid.remove-abandoned-timeout=1800
spring.datasource.druid.filter.wall.config.multi-statement-allow=true
##pgVector 配置
spring.datasource.pgsql.host=[pgsql db ip]
spring.datasource.pgsql.port=5432
spring.datasource.pgsql.username=[pgsql db username]
spring.datasource.pgsql.password=[pgsql db psw]
spring.datasource.pgsql.driver-class-name=org.postgresql.Driver
spring.datasource.pgsql.url=jdbc:postgresql://${spring.datasource.pgsql.host}:${spring.datasource.pgsql.port}/energy_ai
spring.datasource.pgsql.druid.pool-prepared-statements=true
spring.datasource.pgsql.max-active=500
spring.datasource.pgsql.max-wait=30000
spring.datasource.pgsql.connect-timeout=5000
#xxl-job配置 按需接入
xxl.job.admin.addresses=[xxljob注册中心地址]
xxl.job.accessToken=1xtP82R1ZawgiWNue2WxwTCD79BIrhmr
xxl.job.executor.logpath=/opt/wwwroot/api/logs/jobhandler
xxl.job.executor.logretentiondays=30
#rabbitMq配置 按需接入
spring.rabbitmq.username=[rabbitmq username]
spring.rabbitmq.password=[rabbitmq psw]
spring.rabbitmq.virtual-host=/
spring.rabbitmq.dynamic=true
spring.rabbitmq.host=[rabbitmq host]
spring.rabbitmq.port=5672
spring.rabbitmq.delayed.queue.enable=true
#redis通用配置
spring.data.redis.repositories.enabled=false
spring.data.redis.database=0
spring.data.redis.host=[redis host]
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=5000ms
# Lettuce 连接池配置
# spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=100
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.time-between-eviction-runs=10s
# 集群配置
spring.data.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.lettuce.cluster.refresh.period=20s
# Jedis 连接池配置
spring.data.redis.jedis.pool.enabled=false
spring.data.redis.jedis.pool.max-active=300
spring.data.redis.jedis.pool.max-idle=20
spring.data.redis.jedis.pool.min-idle=2
spring.data.redis.jedis.pool.max-wait=5000ms
# 线程池配置
spring.task.execution.pool.core-size=50
spring.task.execution.pool.max-size=200
spring.task.execution.pool.queue-capacity=10000
###注册配置中心公共配置 mse/nacos
application.env=dev
application.group=[mse/nacos server group]
dubbo.provider.group=${application.group}
dubbo.consumer.group=${application.group}
dubbo.registry.group=${application.group}
#Nacos注册中心地址
dubbo.registry.address=nacos://[mse/nacos ip]:8848?accessKey=[accessKey]&secretKey=[secretKey]
#dubbo服务注册中心命名空间
dubbo.registry.parameters.namespace=${application.env}
dubbo.config-center.namespace=${application.env}
#dubbo消费端配置
dubbo.application.qosEnable=false
#关闭强制检查，防止服务提供者未启动而本消费服务报错
dubbo.consumer.check=false
#关闭类序列化强制检查
dubbo.application.serialize-check-status=DISABLE
#dubbo.protocol.serialization = fastjson2
#全局dubbo默认超时时间（单位：毫秒）
dubbo.consumer.timeout=8000
dubbo.provider.timeout=8000
dubbo.registry.simplified=true
#spring-cloud注册中心地址
spring.cloud.nacos.discovery.server-addr=[mse/nacos ip]:8848
#sdc服务注册中心命名空间
spring.cloud.nacos.discovery.namespace=${application.env}
spring.cloud.nacos.discovery.group=${application.group}
##以下配置线上不需要配置，直接内网无需考虑鉴权
#注册中心ack访问
spring.cloud.nacos.discovery.accessKey=[mse/nacos ak]
spring.cloud.nacos.discovery.secretKey=[mse/nacos sk]
#配置中心ack访问
spring.cloud.nacos.config.accessKey=[mse/nacos ak]
spring.cloud.nacos.config.secretKey=[mse/nacos sk]
##resilience4j熔断降级配置
##circuitbreaker
resilience4j.circuitbreaker.backends.defaultInstance.wait-duration-in-open-state=5000
resilience4j.circuitbreaker.backends.defaultInstance.failureRateThreshold=50
resilience4j.circuitbreaker.backends.defaultInstance.eventConsumerBufferSize=10
resilience4j.circuitbreaker.backends.defaultInstance.registerHealthIndicator=true
#resilience4j.circuitbreaker.backends.defaultInstance.recordFailurePredicate=cn.com.scitc.RecordFailurePredicate
resilience4j.circuitbreaker.backends.defaultInstance.recordExceptions[0]=org.springframework.web.client.HttpServerErrorException
resilience4j.circuitbreaker.backends.defaultInstance.ignoreExceptions[0]=org.springframework.web.client.HttpClientErrorException
##retry
resilience4j.retry.retryAspectOrder=399
resilience4j.retry.backends.defaultInstance.max-attempts=2
resilience4j.retry.backends.defaultInstance.waitDuration=300
resilience4j.retry.backends.defaultInstance.eventConsumerBufferSize=1
resilience4j.retry.backends.defaultInstance.enableExponentialBackoff=true
resilience4j.retry.backends.defaultInstance.exponentialBackoffMultiplier=2
resilience4j.retry.backends.defaultInstance.enableRandomizedWait=false
resilience4j.retry.backends.defaultInstance.randomizedWaitFactor=0.5
resilience4j.retry.backends.defaultInstance.retryExceptions[0]=java.io.IOException
#resilience4j.retry.backends.defaultInstance.retryExceptionPredicate=cn.com.scitc.RecordFailurePredicate
#resilience4j.retry.backends.defaultInstance.ignoreExceptions[0]=
##ratelimiter
resilience4j.ratelimiter.limiters.defaultInstance.limitForPeriod=1000
resilience4j.ratelimiter.limiters.defaultInstance.limit-refresh-period=1s
resilience4j.ratelimiter.limiters.defaultInstance.timeout-duration=2000
resilience4j.ratelimiter.limiters.defaultInstance.subscribeForEvents=true
resilience4j.ratelimiter.limiters.defaultInstance.registerHealthIndicator=true
resilience4j.ratelimiter.limiters.defaultInstance.eventConsumerBufferSize=100
#rpc日志
log.enable.rpc=true
#################################### common end ####################################

